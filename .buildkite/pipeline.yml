# Buildkite pipeline for readme-lint
#
# This pipeline runs on the self-hosted GCP agent provisioned by
# github.com/swantron/buildkite-gcp-agent. All steps target the
# "gcp" queue via agent tags.
#
# Pipeline structure:
#   1. ci       — format check, vet, build, self-lint (always runs)
#   2. release  — parallel cross-platform binary builds (tag pushes only)
#   3. publish  — create GitHub release with artifacts (after release stage)
#
# Compared to the equivalent GitHub Actions workflows, this pipeline
# demonstrates two Buildkite-specific capabilities:
#
#   Parallel steps: The cross-platform builds in the release stage run as
#   true parallel steps dispatched to the agent simultaneously, rather than
#   sequential run statements in a single job. At scale this pattern
#   distributes compilation across a pool of agents.
#
#   Annotations: The CI stage uploads a structured annotation so build
#   results are surfaced directly in the Buildkite UI — not just buried
#   in raw log output. Teams with many pipelines find this invaluable
#   for triage without opening every individual job log.

agents:
  queue: gcp

steps:

  # ============================================================
  # Stage 1: CI — runs on every push and pull request
  # ============================================================

  - label: ":go: Format"
    key: fmt
    command: |
      which gofmt || { echo "gofmt not found — Go not in PATH"; exit 1; }
      if [ "$$(gofmt -s -l . | wc -l)" -gt 0 ]; then
        echo "Code is not formatted. Run 'go fmt ./...'"
        gofmt -s -d .
        exit 1
      fi
      echo "--- Format check passed"

  - label: ":go: Vet"
    key: vet
    command: |
      which go || { echo "go not found — Go not in PATH"; exit 1; }
      go vet ./...
      echo "--- Vet passed"

  # Tests run in parallel with vet — no dependency between them.
  # gotestsum produces JUnit XML which Buildkite renders as a structured
  # test report annotation, surfacing individual pass/fail/skip counts
  # directly in the build UI without opening logs.
  - label: ":go: Test"
    key: test
    command: |
      which gotestsum || { echo "gotestsum not found — pre-install it on the agent"; exit 1; }
      gotestsum --junitfile junit.xml --format testname -- ./...
    artifact_paths: "junit.xml"

  # Upload JUnit results as a Buildkite annotation.
  # The annotation renders a test summary (passed/failed/skipped counts
  # plus individual failure details) inline on the build page.
  - label: ":junit: Annotate Tests"
    key: annotate-tests
    depends_on:
      - test
    allow_dependency_failure: true  # annotate even if tests failed
    command: |
      buildkite-agent artifact download junit.xml .
      # Buildkite natively renders JUnit XML when uploaded via test-collector
      # For self-hosted agents without the collector, we parse and annotate manually
      TOTAL=$$(python3 -c "
      import xml.etree.ElementTree as ET
      tree = ET.parse('junit.xml')
      root = tree.getroot()
      suite = root if root.tag == 'testsuite' else root.find('testsuite')
      tests = suite.get('tests', '0')
      failures = suite.get('failures', '0')
      errors = suite.get('errors', '0')
      skipped = suite.get('skipped', '0')
      passed = int(tests) - int(failures) - int(errors) - int(skipped)
      print(f'tests={tests} passed={passed} failed={int(failures)+int(errors)} skipped={skipped}')
      ")
      FAILED=$$(echo $$TOTAL | grep -oP 'failed=\K[0-9]+')
      if [ "$$FAILED" -gt 0 ]; then
        buildkite-agent annotate "**Tests failed** — $$TOTAL :x:" --style "error" --context "test-summary"
      else
        buildkite-agent annotate "**All tests passed** — $$TOTAL :white_check_mark:" --style "success" --context "test-summary"
      fi

  - label: ":go: Build & Self-lint"
    key: build
    depends_on:
      - vet
      - test
    command: |
      go build -o readme-lint .
      ./readme-lint ./README.md
      echo "--- Build and self-lint passed"
    artifact_paths: "readme-lint"

  # ============================================================
  # Stage 2: Release — parallel cross-platform builds
  # Only runs on version tags (v*)
  # ============================================================

  - wait: ~
    if: build.tag =~ /^v/

  - label: ":linux: Build linux/amd64"
    key: build-linux-amd64
    if: build.tag =~ /^v/
    command: GOOS=linux GOARCH=amd64 go build -o readme-lint-linux-amd64 .
    artifact_paths: "readme-lint-linux-amd64"

  - label: ":linux: Build linux/arm64"
    key: build-linux-arm64
    if: build.tag =~ /^v/
    command: GOOS=linux GOARCH=arm64 go build -o readme-lint-linux-arm64 .
    artifact_paths: "readme-lint-linux-arm64"

  - label: ":darwin: Build darwin/amd64"
    key: build-darwin-amd64
    if: build.tag =~ /^v/
    command: GOOS=darwin GOARCH=amd64 go build -o readme-lint-darwin-amd64 .
    artifact_paths: "readme-lint-darwin-amd64"

  - label: ":darwin: Build darwin/arm64"
    key: build-darwin-arm64
    if: build.tag =~ /^v/
    command: GOOS=darwin GOARCH=arm64 go build -o readme-lint-darwin-arm64 .
    artifact_paths: "readme-lint-darwin-arm64"

  - label: ":windows: Build windows/amd64"
    key: build-windows-amd64
    if: build.tag =~ /^v/
    command: GOOS=windows GOARCH=amd64 go build -o readme-lint-windows-amd64.exe .
    artifact_paths: "readme-lint-windows-amd64.exe"

  # ============================================================
  # Stage 3: Publish — waits for all release builds to complete
  # ============================================================

  - wait: ~
    if: build.tag =~ /^v/

  - label: ":github: Publish Release"
    key: publish
    if: build.tag =~ /^v/
    command: |
      # Download all artifacts built in the release stage
      buildkite-agent artifact download "readme-lint-*" .

      # Create GitHub release via gh CLI
      gh release create "$${BUILDKITE_TAG}" \
        readme-lint-linux-amd64 \
        readme-lint-linux-arm64 \
        readme-lint-darwin-amd64 \
        readme-lint-darwin-arm64 \
        readme-lint-windows-amd64.exe \
        --title "$${BUILDKITE_TAG}" \
        --generate-notes
